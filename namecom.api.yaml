    RequirementField:
      description: A field definition for TLD registration requirements, including validation rules, conditional logic, and nested field structures.
      type: object
      required:
        - type
        - required
      properties:
        description:
          description: A detailed description of what this field is for and any specific requirements or constraints.
          type: string
          example: First name of registrant
        type:
          description: |
            The requirement type of this field. Each requirement type has different information.

            Possible values and their details:

              - **`string`**: These are open string fields that cannot be submitted as empty. They will always have a label. A description is optional as the label may convey all of the required information the user would need to submit.
                  Note: Some string fields may have a required format (i.e. date format of YYYY/MM/DD). The format will be listed in the "validation" parameter if required.
                  Example TLDs: abogado, law, com.br (and more)

              - **`notice`**: These field types will just have a description, and contain information that must be displayed to the user prior to registration. There is no data that will be required to be submitted, so all notice type fields will have a "required" value of `false`.
                  Example TLDs: at (notice only), ca (1 notice field)

              - **`acknowledgement`**: These field types will have a description, label and value. The description must be displayed to the user, the label is the required label for the acknowledgement, and the value is what must be submitted.
                  Example TLDs: security, ngo, music (and more)

              - **`enum`**: The field types have a list of predefined options that the user must choose from in order to submit. Only the values returned in the "options" array will be allowed, or the request will fail validation. Options MAY include dependent fields, as some registries required additional information depending on what was chosen for the "parent" option. All dependent fields will follow the same field patterns as the parent fields.
                  Options: These are the predefined options for the enum type fields. They will always have a label and a value. The value is what must be submitted. The options MAY include a description, but will mostly only have a label parameter.
                  Note: There may be a single option returned for an enum. This is because that is the ONLY OPTION ALLOWED by the registry.
                  Example TLDs with simple lists: ca, es (and more)
                  Example TLDs with dependent fields: fr, se, com.br

              - **`boolean`**: Boolean fields for simple true/false acknowledgements or selections.
                  Example TLDs: security
          enum:
            - string
            - notice
            - acknowledgement
            - enum
            - boolean
          example: string
        required:
          description: Whether this field is mandatory for domain registration. If true, the field must be provided.
          oneOf:
            - type: boolean
              example: true
            - type: string
              example: 'true'
          example: true
        label:
          description: A user-friendly label for this field that can be used in UI forms.
          type: string
          example: First Name
        validation:
          description: Validation rule to apply to this field. Common validations include 'valid_email', 'valid_phone', etc.
          type:
            - string
            - 'null'
          example: valid_email
        options:
          description: For fields with predefined choices, this can be either an array of complex option objects, a simple array of string values, or null if no options are available.
          oneOf:
            - type: array
              items:
                $ref: '#/components/schemas/RequirementFieldOption'
              minItems: 0
            - type: array
              items:
                type: string
              minItems: 0
              example:
                - English
                - French
            - type: 'null'
        required_when:
          description: For conditional fields, specifies when this field becomes required (e.g., when a parent option has a specific value).
          type:
            - string
            - 'null'
          example: FR
        fields:
          description: For complex fields or when options are selected, contains nested field definitions that become relevant.
          type:
            - object
            - 'null'
          additionalProperties:
            $ref: '#/components/schemas/RequirementField'
        value:
          description: For acknowledgement fields, this is the value that must be submitted when the user acknowledges the requirement.
          type:
            - string
            - 'null'
          example: accepted
    RequirementFieldOption:
      description: An option within a field that has predefined choices, including the option value, label, and any nested fields that become relevant when this option is selected.
      type: object
      required:
        - value
      properties:
        value:
          description: The actual value of this option. This is what must be submitted when this option is selected.
          type: string
          example: 'no'
        label:
          description: A user-friendly label for this option that can be displayed in UI forms.
          type: string
          example: I am an individual
        fields:
          description: When this option is selected, these nested fields become relevant and may be required. This allows for conditional field logic.
          type:
            - object
            - 'null'
          additionalProperties:
            $ref: '#/components/schemas/RequirementField'
          example:
            X-FR-BIRTHDATE:
              description: DOB in format yy/mm/dd
              type: string
              required: true
            X-FR-BIRTHPLACE:
              required: true
              description: Nation of Birth
              type: enum
              options:
                - FR
                - GB
                - USA
    ContactsRequirement:
      description: ContactsRequirement defines the registration requirements for contact fields for a specific TLD, including required fields, validation rules, and conditional logic. This follows the RequirementField structure with contact roles as nested fields.
      type: object
      required:
        - type
        - required
      properties:
        description:
          description: A detailed description of the contact requirements for this TLD, including eligibility criteria, restrictions, and important notes.
          type: string
          example: The contacts required to be submitted for registration
        type:
          description: The requirement type, which will be "string" for contacts.
          type: string
          example: string
        required:
          description: Whether contact information is mandatory for domain registration.
          oneOf:
            - type: boolean
              example: true
            - type: string
              example: 'true'
          example: true
        label:
          description: A user-friendly label for the contacts field.
          type: string
          example: contacts
        fields:
          description: An object containing contact roles (registrant, tech, admin, etc.) with their individual field requirements.
          type: object
          additionalProperties:
            type: object
            description: Contact role requirements (e.g., registrant, tech, admin)
            properties:
              description:
                description: Description of the contact role requirements.
                type: string
              type:
                description: The requirement type for this contact role.
                type: string
                example: string
              required:
                description: Whether this contact role is required.
                oneOf:
                  - type: boolean
                  - type: string
                example: true
              fields:
                description: Individual contact fields for this role, following RequirementField structure.
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/RequirementField'
    Requirement:
      description: Requirement defines the registration requirements for a specific TLD, including required fields, validation rules, and conditional logic.
      type: object
      properties:
        description:
          description: A detailed description of the registration requirements for this TLD, including eligibility criteria, restrictions, and important notes.
          type: string
          example: Required fields to register an .fr domain
        fields:
          description: An object containing all required and optional fields for domain registration, with their validation rules and conditional logic.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/RequirementField'
    GetRequirementResponse:
      description: GetRequirementResponse has TLD Info and registration requirements for the specified TLD. The requirements field will always be present but may be an empty object when no specific requirements exist for the TLD.
      type: object
      properties:
        tldInfo:
          description: General information about a specific TLD. These are not registration requirements, but contain useful information for domain reseller and domain registrants in general.
          $ref: '#/components/schemas/ResellerTldInfo'
        contacts:
          description: |-
            The registration requirements for the contacts for this TLD, including required fields, validation rules, and conditional logic.  This field will always be present but may be an empty object when no specific requirements exist for the TLD.
            Only a few CC Tlds have specific contact requirements. These contacts must be submitted as part of the domain object when registering a domain, and not part of the `tldRequirements` parameter.
            Please check the contact requirements carefully, as different fields may be required for different roles, and there may be additional validation rules that must be followed.
          $ref: '#/components/schemas/ContactsRequirement'
        requirements:
          description: The registration requirements for this TLD, including required fields, validation rules, and conditional logic. This field will always be present but may be an empty object when no specific requirements exist for the TLD.
          $ref: '#/components/schemas/Requirement'
      required:
        - requirements
        - tldInfo
        - contacts
    DomainClaimsCheckRequest:
      type: object
      description: Request parameters for domain claims checking
      properties:
        purchaseType:
          type: string
          description: The type of purchase/registration for which to check claims. Defaults to 'registration'. Other values like 'landrush_eap', 'landrush_auction_a', 'landrush_reserve_a' may be used during new gTLD launches.
          default: registration
          enum:
            - registration
            - landrush_eap
            - landrush_auction_a
            - landrush_reserve_a
          example: registration
    TrademarkClaim:
      type: object
      description: Information about a specific trademark claim
      required:
        - trademark
        - holder
      properties:
        trademark:
          type: string
          description: The trademark text that matches the domain
          example: TikTok
        holder:
          type: string
          description: The entity that holds the trademark
          example: ByteDance Ltd.
        jurisdiction:
          type: string
          description: The jurisdiction where the trademark is registered
          example: US
        registrationNumber:
          type: string
          description: The trademark registration number
          example: US123456789
        description:
          type: string
          description: Additional description of the trademark
          example: Social media platform trademark
        noticeHtml:
          type: string
          description: HTML content to display about this specific trademark claim
          example: <div class='trademark-notice'>This domain may infringe on the TikTok trademark held by ByteDance Ltd.</div>
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Confidence score for the trademark match (0.0 to 1.0)
          example: 0.95
    DomainClaimsCheckResponse:
      type: object
      description: Response containing domain-specific claims data and trademark information
      required:
        - domain
        - claims
      properties:
        domain:
          type: string
          description: The domain name that was checked for claims
          example: tiktok.page
        claims:
          type: array
          description: List of trademark claims found against this domain
          items:
            $ref: '#/components/schemas/TrademarkClaim'
        claimsProcessActive:
          type: boolean
          description: Whether the TLD of this domain requires claims checking
          example: true
        claimId:
          type:
            - string
            - 'null'
          description: The claim identifier from TMCH (null if no claims found)
          example: 8c3027d30000000000382500785
        notBefore:
          type:
            - string
            - 'null'
          format: date-time
          description: The date before which the claim acknowledgment is not valid (null if no claims found)
          example: '2024-01-15T10:30:00Z'
        notAfter:
          type:
            - string
            - 'null'
          format: date-time
          description: The date after which the claim acknowledgment expires (null if no claims found)
          example: '2024-01-15T10:30:00Z'
        claimsNotice:
          type: string
          description: Markdown content to display about this specific trademark claim
          example: '**This domain may infringe on a trademark claim. Proceeding with registration acknowledges that you have received notice of this claim.**'
    TldPriceListEntry:
      description: |
        The pricing for an individual TLD.

        Please note that if `null` is returned for any of the prices, it means that particular product is unavailable at name.com.

        For example, if `registrationPrice` returns as `null` in the response, it means that name.com is not currently accepting registrations for that TLD.
      properties:
        tld:
          description: The TLD the pricing applies to. For IDN TLDs, this will be the unicode representation of the TLD.
          type: string
          example: com
        duration:
          description: The number of years this pricing is for
          type: integer
          format: int32
          example: 1
        registrationPrice:
          description: This is your account level price in US Dollars (USD) and is the price you pay for non-premium registrations. It includes applicable rebates, promotions and/or account-level discounts.
          type:
            - number
            - 'null'
          format: double
          example: 9.99
        registrationRetailPrice:
          description: This is the current retail price on name.com in US Dollars (USD) after including rebates, promotions and/or sales for registering non-premium domains.
          type:
            - number
            - 'null'
          format: double
          example: 10.99
        registrationOriginalPrice:
          description: This is name.com's suggested retail price (MSRP) in US Dollars (USD) before any discounts for registering non-premium domains.
          type:
            - number
            - 'null'
          format: double
          example: 11.99
        renewalPrice:
          description: This is your account level price in US Dollars (USD) and is the price you pay for non-premium renewals. It includes applicable rebates, promotions and/or account-level discounts.
          type:
            - number
            - 'null'
          format: double
          example: 9.99
        renewalRetailPrice:
          description: This is the current retail price on name.com in US Dollars (USD) after including rebates, promotions and/or sales for renewals of non-premium domains.
          type:
            - number
            - 'null'
          format: double
          example: 10.99
        renewalOriginalPrice:
          description: This is name.com's suggested retail price (MSRP) in US Dollars (USD) before any discounts for renewals of non-premium domains.
          type:
            - number
            - 'null'
          format: double
          example: 11.99
        domainRestorationPrice:
          description: This is your account level price in US Dollars (USD) and is the price you pay for non-premium restorations. It includes applicable rebates, promotions and/or account-level discounts.
          type:
            - number
            - 'null'
          format: double
          example: 120.99
        domainRestorationRetailPrice:
          description: This is the current retail price on name.com in US Dollars (USD) after including rebates, promotions and/or sales for restorations of non-premium domains.
          type:
            - number
            - 'null'
          format: double
          example: 130.99
        domainRestorationOriginalPrice:
          description: This is name.com's suggested retail price (MSRP) in US Dollars (USD) before any discounts for restoration of non-premium domains.
          type:
            - number
            - 'null'
          format: double
          example: 140.99
        transferInPrice:
          description: This is your account level price in US Dollars (USD) and is the price you pay for non-premium transfers. It includes applicable rebates, promotions and/or account-level discounts.
          type:
            - number
            - 'null'
          format: double
          example: 19.99
        transferInRetailPrice:
          description: This is the current retail price on name.com in US Dollars (USD) after including rebates, promotions and/or sales for transfers of non-premium domains.
          type:
            - number
            - 'null'
          format: double
          example: 20.99
        transferInOriginalPrice:
          description: This is name.com's suggested retail price (MSRP) in US Dollars (USD) before any discounts for transfer of non-premium domains.
          type:
            - number
            - 'null'
          format: double
          example: 21.99
      required:
        - tld
        - duration
        - registrationPrice
        - registrationRetailPrice
        - registrationOriginalPrice
        - renewalPrice
        - renewalRetailPrice
        - renewalOriginalPrice
        - domainRestorationPrice
        - domainRestorationRetailPrice
        - domainRestorationOriginalPrice
        - transferInPrice
        - transferInRetailPrice
        - transferInOriginalPrice
    TldPriceListResponse:
      properties:
