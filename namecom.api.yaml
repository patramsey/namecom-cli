        - to
        - pricing
    ZoneCheckRequest:
      description: ZoneCheck request checks DNS zone files for the availability of the specified domains.
      type: object
      properties:
        domainNames:
          description: |-
            Array of domain names to check. Each entry is normalized and validated before zone check runs. Entries that are not valid domain strings,  that use unsupported TLDs for this service, or that fail other pre-validation rules are omitted from the check; the response `removed` field  reports how many were omitted (not which values).

            **Valid domain string (after normalization)** — for reliable results and to avoid errors once all entries are removed:

            - **Allowed characters:** ASCII letters (`a`–`z`), digits (`0`–`9`), and hyphens (`-`).

            - **Hyphen rules:** A domain (the part between dots) must not start or end with a hyphen (for example, `-test.com` and `test-.com` are invalid).

            - **Domain length:** Each domain must be between 1 and 63 characters.

            - **Internationalized domains (IDNs):** Non-ASCII characters (for example `ö` or `ñ`) should be submitted as Punycode (`xn--...`) for  consistent registry resolution.
          type: array
          items:
            type: string
            minLength: 1
          minItems: 1
          maxItems: 500
          examples:
            - - example.com
              - example.net
              - example.org
            - - test.net
      required:
        - domainNames
    ZoneCheckResult:
      description: Result for checking and individual domain's presense in DNS zone files.
      type: object
      properties:
        domainName:
          description: The domain name that was checked
          type: string
          example: example.com
        available:
          description: If the domain is potentially available for purchase after checking for it's presense in the DNZ zone files.
          type:
            - boolean
            - 'null'
          examples:
            - true
            - false
            - null
      required:
        - domainName
        - available
    ZoneCheckResponse:
      description: Response for checking domain availability via DNS zone checks.
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/ZoneCheckResult'
            minLength: 0
        total:
          description: Total number of records checked
          type: integer
          format: int32
          example: 5
        removed:
          description: Number of domain strings removed during pre-validation (invalid format, unsupported TLD for this service, etc.). This is a count only;  the response does not list which strings were removed.
          type: integer
          format: int32
          example: 1
      required:
        - results
        - total
    PremiumDomainsDownloadResponse:
      type: object
      properties:
        downloadUrl:
          type: string
          format: uri
          description: The pre-signed URL to use to download the list.
          example: https://name-ote-downloads/PremiumList_123456.zip
          readOnly: true
        expireDate:
          description: The timestamp that the URL will expire.
          type: string
          format: date-time
          example: '2025-09-04T16:45:00Z'
          readOnly: true
      required:
        - downloadUrl
        - expireDate
    UnverifiedContact:
      type: object
      description: The pertinent information used to identifiy a domain contact that requires verification as per ICANN requirements.
      properties:
        verificationId:
          description: The id of the verification record for the contact. Please note, this is different than the `contact_id` that may be returned in other API contexts. This id specifically relates to the verification record and will be different than a `contact_id` for the same contact record in other contexts.
          type: integer
          format: int64
          example: 4897668
        createDate:
          description: The date the record requiring verification was created.
          type: string
          format: date-time
          example: '2025-01-01T15:35:06Z'
          readOnly: true
        verifyBy:
          description: The date/time that the contact record **must** be verified by.  If the contact record is not verified by this date, the domain may become locked by the registry. This is typically 15 days from the creation date of the verification record, but may vary by TLD and registry.
          type: string
          format: date-time
          example: '2025-01-16T15:35:06Z'
          readOnly: true
        email:
          description: The email address of the contact to be verified. This is the primary identifier used for verification.
          type: string
          format: email
          example: admin@example.com
          readOnly: true
        domains:
          description: A list of the domains that the contact verification record is applied to.
          type: array
          items:
            type: string
            format: hostname
          minItems: 1
      required:
        - verificationId
        - createDate
        - verifyBy
        - email
        - domains
    UnverifiedContactsResponse:
      description: A list of unverified contacts that relate to your account.
      type: object
      properties:
        unverifiedContacts:
          type: array
          items:
            $ref: '#/components/schemas/UnverifiedContact'
        from:
