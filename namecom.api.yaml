webhooks:
  accountCreditBalanceChange:
    post:
      tags:
        - Webhook Notifications
      operationId: AccountCreditBalanceChangeWebhook
      summary: Account Credit Balance Change
      description: This is the payload that will be sent to the subscribed URL, when a changed to the amount of account credit for an account changes. This will trigger on both increases and decreases in account credit for the account.
      parameters:
        - name: X-NAMECOM-SIGNATURE
          in: header
          description: HMAC signature for the request payload. See HMAC signing documentation for example code and detailed explanation of signing.
          required: true
          schema:
            type: string
            example: djasfgafgflgsdfgdsfkhfhjas,12334782,1123-3423-4dss4-354
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreditBalanceChange'
      responses:
        '200':
          description: The subscribed server accepted the request.
        4XX:
          description: The subscribed server returned an error (bad request, Unauthenticated etc).
        5XX:
          description: The subscribed server experienced an error while processing the request.
  domainLockStatusChange:
    post:
      tags:
        - Webhook Notifications
      operationId: DomainLockStatusChangeWebhook
      summary: Domain Lock Status Change
      description: Sent when a domain lock is added or removed, which may restrict or lift normal operations. This event is triggered automatically whenever covered lock types (e.g., compliance or verification holds) are added or removed. A webhook payload is delivered to the subscribed endpoint, providing details about the domain and its updated status.
      parameters:
        - name: X-NAMECOM-SIGNATURE
          in: header
          description: HMAC signature for the request payload. See HMAC signing documentation for example code and detailed explanation of signing.
          required: true
          schema:
            type: string
            example: djasfgafgflgsdfgdsfkhfhjas,12334782,1123-3423-4dss4-354
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainLockStatusChange'
            examples:
              example:
                value:
                  eventName: domain.lock.status_change
                  domainName: example.org
                  action: added
                  lockType: ClientHold
                  registryStatuses:
                    - clientHold
                    - clientTransferProhibited
                    - clientUpdateProhibited
      responses:
        '200':
          description: The subscribed server accepted the request.
        4XX:
          description: The subscribed server returned an error (bad request, Unauthenticated etc).
        5XX:
          description: The subscribed server experienced an error while processing the request.
  domainTransferStatusChange:
    post:
      tags:
        - Webhook Notifications
      operationId: DomainTransferStatusChangeWebhook
      summary: Domain Transfer In Status Change
      description: |-
        Sent when you have subscribed to the event on your account, and a domain transfer IN to name.com is processing.
        This webhook reports status changes for transfers where name.com is the gaining registrar (i.e., transfers into your name.com account).
      parameters:
        - name: X-NAMECOM-SIGNATURE
          in: header
          description: HMAC signature for the request payload. See HMAC signing documentation for example code and detailed explanation of signing.
          required: true
          schema:
            type: string
            example: djasfgafgflgsdfgdsfkhfhjas,12334782,1123-3423-4dss4-354
      requestBody:
        description: The request sent to your server.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainTransferStatusChange'
      responses:
        '200':
          description: The subscribed server accepted the request.
        4XX:
          description: The subscribed server returned an error (bad request, Unauthenticated etc).
        5XX:
          description: The subscribed server experienced an error while processing the request.
  domainTransferOutStatusChange:
    post:
      tags:
        - Webhook Notifications
      operationId: DomainTransferOutStatusChangeWebhook
      summary: Domain Transfer Out Status Change
      description: |-
        Sent when you have subscribed to the event on your account, and a domain transfer OUT from name.com to another registrar has a status change. Status may be "initiated" (transfer out was started), "completed" (domain has been removed from name.com), or "canceled" (transfer out was canceled before completion).
        When status is "completed", the domain has been removed from name.com. In some edge cases (including near-expiration scenarios) the data may not be fully accurate. For example, registry sync delays or edge timing around expiration can cause temporary discrepancies between the payload and the registry’s eventual state.
      parameters:
        - name: X-NAMECOM-SIGNATURE
          in: header
          description: HMAC signature for the request payload. See HMAC signing documentation for example code and detailed explanation of signing.
          required: true
          schema:
            type: string
            example: djasfgafgflgsdfgdsfkhfhjas,12334782,1123-3423-4dss4-354
      requestBody:
        description: The request sent to your server when a domain transfer out status changes.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainTransferOutStatusChange'
            examples:
              initiated:
                summary: Transfer out initiated
                value:
                  eventName: domain.transfer_out.status_change
                  domainName: example.com
                  status: initiated
                  registryClientId: NAMECOM-123
              completed:
                summary: Transfer out completed
                value:
                  eventName: domain.transfer_out.status_change
                  domainName: example.com
                  status: completed
                  registryClientId: NAMECOM-123
              canceled:
                summary: Transfer out canceled
                value:
                  eventName: domain.transfer_out.status_change
                  domainName: example.com
                  status: canceled
                  registryClientId: NAMECOM-123
      responses:
        '200':
          description: The subscribed server accepted the request.
        4XX:
          description: The subscribed server returned an error (bad request, unauthenticated, etc).
        5XX:
          description: The subscribed server experienced an error while processing the request.
