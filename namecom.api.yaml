  /core/v1/refund:
    post:
      description: |
        Deletes eligible domains and security products during the Add Grace Period (AGP) and automatically issues refunds for the associated order items.

        ### Eligibility Requirements

        - **Product Types**: Only `registration` and `whois_privacy` product types are eligible for refunds.
        - **AGP Timing**: Items must be within the Add Grace Period (typically 5 days from registration, varies by TLD).
        - **Order Ownership**: All `orderItemIds` must belong to the specified `orderId`.

        ### Refund Processing

        Refunds are processed in the following order:
        1. Domain deletion is attempted for each eligible order item
        2. Upon successful deletion, the refund is issued
        3. Refunds are sent to the original payment method on file
        4. If the original payment method is unavailable, the refund is credited to the account balance

        ### Idempotency

        This endpoint supports idempotent requests via the `X-Idempotency-Key` header. If you retry a request with the same idempotency key, you will receive the same response as the original request. This is useful for safely retrying requests without risk of processing duplicate refunds.
      operationId: ProcessRefund
      parameters:
        - name: X-Idempotency-Key
          in: header
          description: A unique string (e.g., a UUID v4) to make the request idempotent. This key ensures that if the request is retried, the operation will not be performed multiple times. Subsequent requests with the same key will return the original result. Idempotency keys are valid for 12 hours.
          schema:
            type: string
            example: 083910ef-04e4-4bd1-a0bf-3737fe005ca8
          required: false
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
            examples:
              singleItem:
                summary: Refund a single order item
                description: Request to refund a single domain registration from an order.  If there is a security product associated with the domain, it will also be refunded.
                value:
                  orderId: 123456
                  orderItemIds:
                    - 987654
              multipleItems:
                summary: Refund multiple order items
                description: Request to refund multiple items (e.g., domain registration and security product) from a single order.
                value:
                  orderId: 123456
                  orderItemIds:
                    - 987654
                    - 987655
        description: RefundRequest contains the order ID and array of order item IDs to be refunded.
        required: true
      responses:
        '200':
          headers:
            X-Idempotency-Key:
              description: If the initial request contained this header, echoes back with the initial value.
              schema:
                type: string
                example: 083910ef-04e4-4bd1-a0bf-3737fe005ca8
            X-Idempotent-Replay:
              description: Indicates that the response is being replayed from an idempotent request. This header will only be returned if the API is responding with cached data. Caches are cleared after 12 hours.
              schema:
                type: number
                example: 1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundResponse'
              examples:
                successfulRefund:
                  summary: Successful refund of domain registration
                  value:
                    results:
                      - orderId: 123456
                        orderItemId: 987654
                        orderItemStatus: refunded
                        refundAmount: 10.99
                        message: Domain successfully deleted and refund processed.
                    totalRefundAmount: 10.99
          description: Refund processed successfully. The response includes the detailed results for each refunded item.
        '400':
          description: Bad request - Invalid input data or order item has already been refunded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidArgument400'
              examples:
                alreadyRefunded:
                  summary: Order item already refunded
                  value:
                    message: Bad Request
                    details: Order item 987654 has already been refunded.
                invalidProductType:
                  summary: Invalid product type
                  value:
                    message: Bad Request
                    details: Order item 987654 is not eligible for refund. Only 'registration' and 'whois_privacy' product types are supported.
                emptyOrderItems:
                  summary: Empty order items array
                  value:
                    message: Bad Request
                    details: orderItemIds array must contain at least one item.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    description: A human-readable message providing more details about the error
                    example: Unauthorized
        '403':
          description: Forbidden - you do not have permission to perform this action.
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    description: A human-readable message providing more details about the error
                    example: Permission denied
                  details:
                    type:
                      - string
                      - 'null'
                    description: Additional context or information about the error
                    example: Failed authentication
        '404':
          description: Not Found - Order ID or order item ID does not exist, or order items do not belong to the specified order.
