          example: '2024-01-15T10:30:00Z'
    CreateDomainRequest:
      description: CreateDomainRequest has the information that is needed to create a domain with the CreateDomain function.
      properties:
        domain:
          $ref: '#/components/schemas/DomainCreatePayload'
        purchasePrice:
          description: PurchasePrice is the price in USD for purchasing this domain for the minimum time period (typically 1 year). PurchasePrice is required if purchaseType is not "registration" or if it is a premium domain. If privacyEnabled is set, the regular price for Whois Privacy protection will be added automatically. If VAT tax applies, it will also be added automatically.
          format: double
          type: number
        purchaseType:
          description: PurchaseType defaults to "registration" but should be copied from the result of either a [Search](/api/v1/reference/domains/search) or [checkAvailability](/api/v1/reference/domains/check-availability) request.
          type: string
        tldRequirements:
          additionalProperties:
            type: string
          description: |-
            TLDRequirements is a way to pass additional data that is required by some registries. You can check before registration by using the [Domain Info](/api/v1/reference/domain-info/get-specific-tld-requirements) API.
            As these requirements vary wildly between registries and TLDs, we are not attempting to document them here.
            #### IDN Domains
            This parameter is required for registering domains that contain non-ASCII characters.  The value should be the specific code for the character set, such as `ES` for Spanish, or `CYRL` for Cyrillic. These abbreviations can vary between TLDs, and it is highly recommended that you use [Domain Info](/api/v1/reference/domain-info/get-specific-tld-requirements) API to ensure that the TLD allows for the specific IDN table, as well as the correct abbreviation.
          type: object
        claims:
          $ref: '#/components/schemas/DomainClaimsInfo'
        years:
          description: |-
            Years specifies how many years to register the domain for. Years defaults to the minimum time period (typically 1 year) if not passed and cannot be more than 10. Some TLDs default to longer initial periods (e.g. .AI requires a 2 year registration).
            If passing purchasePrice make sure to adjust it accordingly.
          format: int32
          type: integer
          example: 1
        promoCode:
          description: PromoCode is an optional promotional code to apply to the domain purchase. Only one promo code can be applied per request.
          type: string
          minLength: 1
      type: object
      required:
        - domain
