  /core/v1/transfers/internal/in:
    post:
      description: |-
        Pulls a domain from another [name.com](https://www.name.com) account into your reseller (gaining) account using a valid authorization code. This is an **internal** name.com-to-name.com move; it is separate from [Create Transfer](/api/v1/reference/transfers/create-transfer), which brings domains in from **external** registrars.
        Check if a TLD is eligible for internal transfer in by calling [Tld Requirements](/api/v1/reference/domaininfo/requirementsV2) for the TLD and checking property `supportsInternalTransfer`.
        This API is only available to approved reseller accounts. Contact name.com support to request access.
        #### Losing account (dashboard only)
        The party that holds the domain today must use the name.com dashboard on the **losing** account to **unlock** the domain (remove registrar transfer lock) and to **copy the authorization code** to provide to your integration. This endpoint does not unlock the domain or retrieve the auth code for the losing account.
        #### Gaining account (this API)
        Call this endpoint with `domainName`, `authCode`, and optional `contacts` using the **gaining** reseller's API credentials.
        #### Contacts and post-transfer lock
        If `contacts` is omitted, the gaining account's default contacts are applied. If `contacts` is provided, any roles included in the request are applied and omitted roles use the gaining account's default contacts (same pattern as [Create Domain](/api/v1/reference/domains/create-domain) and [Set Contacts](/api/v1/reference/domains/set-contacts)). The 60-day contact-change transfer lock is enforced based on the **gaining** account's settings, consistent with Set Contacts.
        #### Access
        Restricted to approved enterprise resellers; other callers receive `403 Forbidden`.
      operationId: CreateInternalTransferIn
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInternalTransferInRequest'
        required: true
      responses:
        '200':
          description: The domain was accepted into the gaining account. The response body matches the domain resource representation used elsewhere in the API (same shape as Get Domain / Set Contacts).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainResponsePayload'
        '400':
          description: Validation failed (missing or invalid fields, invalid authorization code, or other bad input). The `message` and `details` fields describe what to correct.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidArgument400'
              examples:
                missingAuthCode:
                  summary: Missing auth code
                  value:
                    message: Bad Request
                    details: '''authCode'' is required'
                invalidAuthCode:
                  summary: Invalid authorization code
                  value:
                    message: Bad Request
                    details: The authorization code is invalid or has expired.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    description: A human-readable message providing more details about the error
                    example: Unauthorized
        '403':
          description: Forbidden — for example, when the authenticated account is not allowlisted for internal transfers (enterprise-only; initial rollout is limited to designated partners), or when the caller otherwise lacks permission to use this operation.
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    description: A human-readable message providing more details about the error
                    example: Permission denied
                  details:
                    type:
                      - string
                      - 'null'
                    description: Additional context or information about the error
                    example: Failed authentication
        '404':
          description: The domain could not be found for an internal transfer from another name.com account, or it is not eligible to be pulled into the gaining account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound404'
              examples:
                domainNotFound:
                  summary: Domain not found for internal transfer
                  value:
                    message: Not Found
                    details: No eligible domain was found in another name.com account for this request.
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    description: A human-readable message providing more details about the error
                    example: Method Not Allowed
        '409':
          description: The domain is in a state that blocks the operation — for example, **registrar transfer lock** is still active (`clientTransferProhibited` or equivalent). The losing account must remove transfer lock in the name.com dashboard before retrying.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericConflict409'
              examples:
                transferLockActive:
                  summary: Registrar transfer lock still enabled
                  value:
                    message: Conflict
                    details: The domain is locked for transfer at the registrar. Unlock the domain in the losing account's name.com dashboard, then retry.
        '415':
          description: 'POST requests must include `Content-Type: application/json`.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnsupportedMedia415'
        '429':
          description: Rate limit has been exceeded.
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - details
                properties:
                  message:
                    type: string
                    description: |-
                      ### Too Many Requests
                      You have exceeded the rate limit.

                      **Headers returned:**
                      * 'X-RateLimit-Reset': An integer (UTC epoch) indicating when you can retry.
                    example: Rate Limit Exceeded
          headers:
            x-ratelimit-reset:
              description: Unix timestamp for the time at which the current rate limit will reset.
              schema:
                type: number
                example: 1747668270
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    description: A human-readable message providing more details about the error.
                    example: Internal Server Error
                  details:
                    type:
                      - string
                      - 'null'
                    description: Additional context or information about the error.
                    example: Something went wrong.
        '502':
          description: Bad Gateway
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    description: A human-readable message providing more details about the error.
                    example: The server received an invalid response from the upstream server.
        '504':
          description: Gateway Timeout
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    description: A human-readable message providing more details about the error.
                    example: The upstream server is taking too long to respond.
      summary: Create Internal Transfer In
      tags:
        - Transfers
  /core/v1/transfers/eligibility/{domainName}:
    get:
      description: |-
        Returns whether a domain is currently registered at [name.com](https://www.name.com) and whether the TLD supports internal transfer between name.com accounts. Use this to decide whether to send your user through the [Create Transfer](/api/v1/reference/transfers/create-transfer) external transfer flow or the [Create Internal Transfer In](/api/v1/reference/transfers/create-internal-transfer-in) flow before initiating a transfer-in.

        #### Response semantics

        `atName` is `true` if the domain is currently registered at name.com in any account. This information is also publicly available via RDAP.

        `supportsInternalTransfer` mirrors the TLD-level value returned by [Tld Requirements](/api/v1/reference/domain-info/get-specific-tld-requirements). It indicates whether the TLD is eligible for internal transfer between name.com accounts. It does not reflect per-account allowlist eligibility — if your account is not allowlisted for internal transfer in, calling [Create Internal Transfer In](/api/v1/reference/transfers/create-internal-transfer-in) will return `403 Forbidden`.

        #### Privacy

        This endpoint never reveals which account a domain is in. To check whether a domain is in your own account, use [Get Domain](/api/v1/reference/domains/get-domain) instead.
      operationId: GetTransferEligibility
      parameters:
        - description: The domain to check transfer eligibility for. Punycode is normalized server-side, so either ASCII or UTF-8 is accepted.
          in: path
          name: domainName
          required: true
          schema:
            type: string
      responses:
        '200':
          description: A successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferEligibilityResponse'
              examples:
                domainAtNamecomInternalTransferSupported:
                  summary: Domain is at name.com and TLD supports internal transfer
                  value:
                    domainName: example.com
                    atName: true
                    supportsInternalTransfer: true
                domainAtExternalRegistrar:
                  summary: Domain is at an external registrar
                  value:
                    domainName: example.com
                    atName: false
                    supportsInternalTransfer: true
        '400':
          description: Validation failed (invalid domain name, or domain SLD does not meet the TLD's length requirements).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidArgument400'
              examples:
                invalidDomainName:
                  summary: Invalid domain name
                  value:
                    message: Invalid Domain Name
                sldLengthViolation:
                  summary: SLD length requirements not met
                  value:
                    message: The domain doesn't appear to meet the length requirements for the specified tld.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    description: A human-readable message providing more details about the error
