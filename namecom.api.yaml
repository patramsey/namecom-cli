        - orderItemId
        - orderItemStatus
        - refundAmount
      properties:
        orderId:
          type: integer
          format: int32
          description: The unique identifier of the Order that was processed.
          example: 987654
        orderItemId:
          type: integer
          format: int32
          description: The unique identifier of the Order Item that was processed.
          example: 987654
        orderItemStatus:
          type: string
          description: The status of the refund operation for this item.
          enum:
            - refunded
            - failed
            - initialized
            - canceled
          example: refunded
        refundAmount:
          type: number
          format: float
          description: The amount refunded for this order item in USD.
