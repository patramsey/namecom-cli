    post:
      description: |
        Registers a new domain under your account. You must provide the `domain.domainName` at a bare minimum to register. 
        For premium or special-priced domains, the purchase_price must also be included to confirm cost. 
        This endpoint is commonly used to programmatically onboard new domains through user signup flows or checkout experiences.

        If no contacts are passed in this request, the default contacts for your name.com account will be used.

        ### Best Practices For Domain Creates

        In general, you should check that a domain is available prior to attempting to purchase a domain. 
        You can use either the [checkAvailability](/api/v1/reference/domains/check-availability) endpoint, or the [Search](/api/v1/reference/domains/search) endpoint
        to confirm that a domain is purchasable.

        #### Important Note on Dropcatching and Abuse Prevention

        _The createDomain endpoint is designed for standard domain registrations and is not intended for automated dropcatching (i.e., mass or high-frequency attempts to register domains the moment they become available after expiration). The use of drop-catching tools or services to acquire expired domains is strictly prohibited. All domain acquisitions must go through approved channels to ensure fair and transparent access._

        #### Contact Verification
        When a new domain registration is created and a contact is submitted, name.com may need to validate the contact's email address in accordance with ICANN policy. This validation involves sending an email to the provided address, prompting the recipient to click a link to verify their email address.
      operationId: CreateDomain
      parameters:
        - name: X-Idempotency-Key
          in: header
          description: A unique string (e.g., a UUID v4) to make the request idempotent. This key ensures that if the request is retried, the operation will not be performed multiple times. Subsequent requests with the same key will return the original result.
          schema:
            type: string
            example: 083910ef-04e4-4bd1-a0bf-3737fe005ca8
          required: false
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDomainRequest'
            examples:
              noContacts:
                summary: Creating a domain without contacts.
                description: For a basic domain create, you do not need to send contacts in the request. **When contacts are not sent in the request, we will apply the default contacts for your account to the domain.**
                value:
                  domain:
                    domainName: example.com
              multipleYears:
                summary: Creating a domain for multiple years.
                description: To purchase a domain for more than the default minimum for a TLD, just add "years" to the request.
                value:
                  domain:
                    domainName: example.com
                  years: 2
              premiumPurchase:
                summary: Creating a premium domain
                description: To create a premium domain, the `purchasePrice` and `purchaseType` parameters are required
                value:
                  domain:
                    domainName: premiumexample.com
                  purchasePrice: 349.95
                  purchaseType: expiring
              premiumPurchaseMultiYear:
                summary: Creating a premium domain for multiple years
                description: 'To create a premium domain for multiple years, the `purchasePrice`, `purchaseType` and `years` parameters are required. You will need to get the single year pricing, and then multiply the single year pricing by the number of years you wish to purchase the domain for. Example: 1 year pricing = 349.95. 2 year pricing = 699.90'
                value:
                  domain:
                    domainName: premiumexample.com
                  purchasePrice: 699.9
                  purchaseType: expiring
                  years: 2
              singleContactAtCreate:
                summary: Send single, specific contact with domain create
                description: Generally all contacts need to be submitted when creating a domain that will not use your account default contacts. By passing a single contact during a domain create, you can set a single contact to be different than the account default contacts. This may also be required for some TLDs due to ICANN changes in registration contact requirements
                value:
                  domain:
                    domainName: example.com
                    contacts:
                      tech:
                        firstName: Jonny
                        lastName: IT Guy
                        companyName: My Company
                        address1: 1234 Any Street
                        address2: null
                        city: Anytown
                        state: NY
                        zip: '11222'
                        country: US
                        email: support@example.com
                        phone: '+15555555'
              idnRegistration:
                summary: Registering an IDN domain
                description: How to pass the correct IDN language for domains using non-ASCII characters.
                value:
                  domain:
                    domainName: exámple.com
                  tldRequirements:
                    language: ES
                  years: 1
              withClaims:
                summary: Creating a domain with trademark claims acknowledgment
                description: When a domain has trademark claims (as determined by the [Domain Claims Check](/api/v1/reference/domain-info/check-domain-claims) endpoint), you must include the claims acknowledgment data in the domain creation request. This includes the claim identifier and validity dates from the claims check response.
                value:
                  domain:
                    domainName: tiktok.page
                  claims:
                    claimId: 8c3027d30000000000382500785
                    notBefore: '2020-01-01T00:00:00Z'
                    notAfter: '2030-01-01T00:00:00Z'
        description: CreateDomainRequest has the information that is needed to create a domain with the CreateDomain function.
        required: true
      responses:
        '200':
          headers:
            X-Idempotency-Key:
              description: If the initial request contained this header, echoes back with the initial value.
              schema:
                type: string
                example: 083910ef-04e4-4bd1-a0bf-3737fe005ca8
            X-Idempotent-Replay:
              description: Indicates that the response is being replayed from an idempotent request. This header will only be returned if the API is responding with cached data. Caches are cleared after 12 hours.
              schema:
                type: number
                example: 1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDomainResponse'
          description: A successful response.
        '400':
          description: Bad request - Invalid input data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidArgument400'
              examples:
                premiumPriceRequired:
                  summary: Premium domain purchase requires price
                  value:
                    message: Invalid argument
                    details: Purchase price is required for premium domains in order to complete this request
                priceRequired:
                  summary: Purchase price required
                  value:
                    message: Invalid argument
                    details: Purchase price is required in order to complete this request
        '401':
          description: Unauthorized.
          content:
            application/json:
