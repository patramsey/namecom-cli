    DomainTransferStatusChange:
      type: object
      description: |
        Payload sent when a domain transfer IN to name.com is processing. This schema represents transfer-in events where name.com is the gaining registrar.
      properties:
        eventName:
          type: string
          enum:
            - domain.transfer.status_change
          description: The name of the subscription event
        domainName:
          type: string
          description: The domain that the transfer status has changed for
          example: example.com
        status:
          $ref: '#/components/schemas/TransferStatus'
      required:
        - eventName
        - domainName
        - status
    DomainTransferOutStatusChange:
      type: object
      description: Payload sent when a domain transfer OUT from name.com to another registrar has a status change (initiated, completed, or canceled). When status is "completed", the domain has been removed from name.com. In some edge cases (including near-expiration scenarios) the data may not be fully accurate.
      required:
        - eventName
        - domainName
        - status
      properties:
        eventName:
          type: string
          enum:
            - domain.transfer_out.status_change
          description: The name of the subscription event.
        domainName:
          type: string
          description: The domain that has transferred out of name.com.
          example: example.com
        status:
          type: string
          description: |
            The status of the transfer out event. May be "initiated" (transfer out was started), "completed" (domain has been removed from the account), or "canceled" (transfer out was canceled before completion).
          enum:
            - initiated
            - completed
            - canceled
          example: completed
        registryClientId:
          type:
            - string
            - 'null'
          description: |
            The registry client ID associated with the domain at the time of transfer out, when available. This can help identify the gaining registrar at the registry.
          example: NAMECOM-123
    ContactVerificationStatusChange:
      type: object
      required:
        - eventName
        - domains
        - verificationId
        - verification
      properties:
        eventName:
          type: string
          enum:
            - contact.verification.status_change
        domains:
          type: array
          items:
            type: string
        verificationId:
          description: The id of the verification record for the contact. Please note, this is different than the `contact_id` that may be returned in other API contexts. This id specifically relates to the verification and will be different than an `contact_id` for the same contact record in other contexts.
          type: integer
          format: int64
          example: 4897668
        verification:
          discriminator:
            propertyName: status
          oneOf:
            - type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - verified
            - type: object
              required:
                - status
                - verifyBy
              properties:
                status:
                  type: string
                  enum:
                    - unverified
                verifyBy:
                  description: The date when the contact should be verified by.
                  type: string
                  format: date-time
                  example: '2023-04-01T12:00:00Z'
    DomainTransferInternalInStatusChange:
      type: object
      required:
        - eventName
        - sourceAccountId
        - destinationAccountId
        - status
        - occurredAt
        - domain
      description: Payload sent when a domain transfers IN to the webhook subscribers account from another name.com account.
      properties:
        eventName:
          type: string
          enum:
            - domain.transfer.internal_in
          description: The name of the subscription event.
        sourceAccountId:
          description: The account id that previously owned the domain.
          format: int32
          type: integer
          example: 12345
        destinationAccountId:
          description: The account id that now owns the domain.
          format: int32
          type: integer
          example: 12345
        status:
          type: string
          enum:
            - completed
        occurredAt:
          description: When the domain transfer in occurred.
          type: string
          format: date-time
          example: '2023-04-01T12:00:00Z'
        domain:
          $ref: '#/components/schemas/DomainResponsePayload'
    DomainRegistryRejection:
      type: object
      required:
        - eventName
        - domainName
        - occurredAt
        - orderId
        - orderItemId
      description: Payload sent when a domain create request fails after asynchronous registry processing. Most domain creates succeed immediately; this event covers the case where the registry initially accepts processing but later rejects or fails the registration.
      properties:
        eventName:
          type: string
          enum:
            - domain.registry.rejection
          description: The name of the subscription event.
        domainName:
          type: string
          description: The domain name that failed to register.
          example: example.com
        orderId:
          type: integer
          format: int32
          description: The unique identifier of the order for the failed domain create. Use the List Orders endpoint to retrieve order details.
          example: 123456
        orderItemId:
          type: integer
          format: int32
          description: The unique identifier of the order line item for the failed domain create. Use the List Orders endpoint to retrieve order item details.
          example: 987654
        occurredAt:
          description: When the asynchronous registration failure was recorded.
          type: string
          format: date-time
          example: '2023-04-01T12:00:00Z'
        reason:
          type: string
          description: Optional human-readable or registry-provided detail about the failure, when available.
          example: Registry policy violation
